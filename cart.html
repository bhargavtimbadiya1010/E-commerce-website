{% extends "base.html" %} {% block content %}
<h3 class="mb-4">🛒 Your Cart</h3>
{% if items %}
<div class="table-responsive">
  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>Image</th>
        <th>Product</th>
        <th>Price (₹)</th>
      </tr>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>
          <img
            src="{{ url_for('static', filename='images/' ~ item[2]) }}"
            width="80"
            class="rounded"
          />
        </td>
        <td class="align-middle">{{ item[0] }}</td>
        <td class="align-middle">₹ {{ item[1] }}</td>
      </tr>
      {% endfor %}
      <tr class="table-secondary fw-bold">
        <td colspan="2" class="text-end">Total</td>
        <td>₹ {{ total }}</td>
      </tr>
    </tbody>
  </table>
</div>
<div class="d-flex justify-content-end">
  <a href="{{ url_for('checkout') }}" class="btn btn-success btn-lg">Checkout</a>
</div>
{% else %}
<div class="text-center py-5">
  <i class="bi bi-cart-x" style="font-size: 3rem;"></i>
  <p class="mt-3">Your cart is empty.</p>
  <a href="{{ url_for('products') }}" class="btn btn-primary mt-2">Continue Shopping</a>
</div>
{% endif %} {% endblock %}
